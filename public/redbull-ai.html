<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Bull | Покажіть свій напій</title>
    <style>
        :root {
            --bg-color: #0A0A0F;
            --accent-color: #C8102E;
            --text-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, rgba(200, 16, 46, 0.15) 0%, transparent 70%);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Navbar Style - Matching the main site exactly */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #0A0A0F;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 32px;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: transform 0.2s;
        }
        
        .navbar-logo:hover {
            transform: scale(1.02);
        }

        .navbar-logo img {
            height: 24px;
        }

        .navbar-logo span {
            color: white;
            font-weight: bold;
            letter-spacing: 0.5px;
            font-size: 16px;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-btn {
            background: #FFC906;
            color: #1a1a1a;
            padding: 8px 20px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(255, 201, 6, 0.2);
        }

        .nav-btn:hover {
            background: #e6b500;
            transform: scale(1.05);
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: white;
        }

        .user-profile {
            display: none; /* Hidden until loaded */
            align-items: center;
            gap: 16px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding-left: 24px;
            margin-left: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-name {
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .logout-btn {
            color: rgba(255, 255, 255, 0.5);
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: color 0.2s;
        }

        .logout-btn:hover {
            color: #C8102E;
        }

        .login-link {
            background: #C8102E;
            color: white;
            padding: 8px 20px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .login-link:hover {
            background: #a00d25;
        }

        .container {
            width: 90%;
            max-width: 550px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            backdrop-filter: blur(20px);
            margin-top: 80px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        h1 span {
            color: var(--accent-color);
        }

        p.subtitle {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
            font-size: 15px;
        }

        .webcam-container {
            width: 100%;
            aspect-ratio: 4/3;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            transition: opacity 0.4s ease;
            opacity: 0;
        }

        .loading {
            position: absolute;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            padding: 20px;
            font-weight: 500;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn-action {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-action:hover:not(:disabled) {
            background-color: #a00d25;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(200, 16, 46, 0.6);
        }

        .btn-action:disabled {
            background-color: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 10px;
        }

        .prediction-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .prediction-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
        }

        .bar-container {
            width: 100%;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #001E62, var(--accent-color));
            border-radius: 5px;
            transition: width 0.15s ease-out;
            width: 0%;
        }

        .discount-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(200, 16, 46, 0.85);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
            transform: scale(1.05);
        }

        .discount-overlay.active {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }

        .discount-title {
            font-size: 28px;
            margin: 0 0 16px 0;
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .discount-desc {
            font-size: 16px;
            margin: 0;
            opacity: 0.9;
            font-weight: 500;
        }

        .discount-badge {
            margin-top: 20px;
            background: white;
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
        }

        .overlay-button {
            margin-top: 25px;
            background: white;
            color: var(--bg-color);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .overlay-button:hover {
            background: #e6e6e6;
            transform: translateY(-2px);
        }

        .header-logo-img {
            height: 48px;
            margin-bottom: 15px;
            object-fit: contain;
        }
    </style>
    <!-- Load TensorFlow.js and TeachableMachine extensions -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
</head>

<body>
    <nav class="navbar">
        <a href="/" class="navbar-logo">
            <img src="/logo.png" alt="Red Bull Logo">
            <span>RED BULL HOTELS</span>
        </a>
        <div class="navbar-right" id="nav-right">
            <a href="/hotels" class="nav-btn">Готелі</a>
            <div id="auth-links" style="display: flex; align-items: center; gap: 24px;">
                <!-- Links will be injected here via JS -->
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <a href="/">
                <img src="/logo.png" alt="Red Bull Logo" class="header-logo-img">
            </a>
            <h1>Покажіть свій <span>улюбленний напій</span></h1>
            <p class="subtitle">AI-сканер від Red Bull Hotel System</p>
        </div>

        <div class="webcam-container" id="webcam-wrapper">
            <div class="loading" id="status-text">Натисніть "Увімкнути камеру", щоб почати</div>
            <video id="webcam" autoplay playsinline muted></video>

            <div id="discount-overlay" class="discount-overlay">
                <h2 id="overlay-title" class="discount-title"></h2>
                <p id="overlay-desc" class="discount-desc"></p>
                <div id="overlay-badge" class="discount-badge"></div>
                <a href="/hotels" class="overlay-button">Повернутися до готелів</a>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn-action" onclick="init()">Увімкнути камеру</button>
            <button id="stop-btn" class="btn-action" onclick="stop()" disabled>Вимкнути</button>
        </div>

        <div id="label-container">
            <!-- Prediction bars will be injected here -->
        </div>
    </div>

    <script>
        // --- Navbar Logic ---
        async function loadUser() {
            const authLinks = document.getElementById('auth-links');
            try {
                const res = await fetch('/api/auth/me');
                const data = await res.json();
                
                if (data.user) {
                    authLinks.innerHTML = `
                        <a href="/my-bookings" class="nav-link">Мої бронювання</a>
                        <a href="/contacts" class="nav-link">Контакти</a>
                        <div class="user-profile" style="display: flex;">
                            <div class="user-avatar">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: rgba(255,255,255,0.7)"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            </div>
                            <span class="user-name">${data.user.username}</span>
                            <button onclick="logout()" class="logout-btn" title="Вийти">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                            </button>
                        </div>
                    `;
                } else {
                    authLinks.innerHTML = `<a href="/login" class="login-link">Увійти</a>`;
                }
            } catch (e) {
                authLinks.innerHTML = `<a href="/login" class="login-link">Увійти</a>`;
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.reload();
        }

        loadUser();

        // --- AI Logic ---
        const URL = "https://teachablemachine.withgoogle.com/models/HTLz9ftH0/";
        let model, maxPredictions, isRunning = false, requestAnimId, discountAlreadyUsed = false;

        const videoElement = document.getElementById("webcam"), statusText = document.getElementById("status-text");
        const startBtn = document.getElementById("start-btn"), stopBtn = document.getElementById("stop-btn");
        const labelContainer = document.getElementById("label-container"), overlay = document.getElementById("discount-overlay");
        const overlayTitle = document.getElementById("overlay-title"), overlayDesc = document.getElementById("overlay-desc"), overlayBadge = document.getElementById("overlay-badge");

        async function init() {
            startBtn.disabled = true;
            statusText.style.display = "block";
            statusText.innerText = "Завантаження штучного інтелекту...";
            videoElement.style.opacity = "0";
            overlay.classList.remove("active");

            try {
                const res = await fetch('/api/user/discount-status').then(r => r.json()).catch(() => ({used: false}));
                discountAlreadyUsed = !!res.used;

                if (!model) {
                    const ts = Date.now();
                    model = await tmImage.load(URL + "model.json?c=" + ts, URL + "metadata.json?c=" + ts);
                    maxPredictions = model.getTotalClasses();
                }

                statusText.innerText = "Запит доступу до камери...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                videoElement.srcObject = stream;
                await new Promise(r => videoElement.onloadedmetadata = r);
                videoElement.play();
                videoElement.style.opacity = "1";
                statusText.style.display = "none";

                labelContainer.innerHTML = "";
                for (let i = 0; i < Math.max(maxPredictions, 3); i++) {
                    labelContainer.innerHTML += `<div class="prediction-row"><div class="prediction-header"><span class="class-name">Клас ${i + 1}</span><span class="class-score">0%</span></div><div class="bar-container"><div class="bar-fill"></div></div></div>`;
                }

                isRunning = true; stopBtn.disabled = false;
                requestAnimId = window.requestAnimationFrame(loop);
            } catch (err) {
                statusText.innerText = "Помилка: " + err.message;
                startBtn.disabled = false;
            }
        }

        async function loop() { if (isRunning) { await predict(); requestAnimId = window.requestAnimationFrame(loop); } }

        async function predict() {
            if (!model || !videoElement.videoWidth) return;
            const predictions = await model.predict(videoElement);
            const rows = labelContainer.childNodes;
            predictions.forEach((pred, i) => {
                if (i >= rows.length) return;
                const prob = pred.probability;
                if (i === 0 && prob >= 0.80 && !overlay.classList.contains("active")) triggerOverlay("redbull");
                if (i === 1 && prob >= 0.97 && !overlay.classList.contains("active")) triggerOverlay("other");
                
                const row = rows[i];
                row.querySelector('.class-name').innerText = pred.className;
                row.querySelector('.class-score').innerText = (prob * 100).toFixed(1) + "%";
                row.querySelector('.bar-fill').style.width = (prob * 100) + "%";
            });
        }

        function triggerOverlay(type) {
            if (type === "redbull") {
                if (discountAlreadyUsed) {
                    overlayTitle.innerText = "Дякуємо за лояльність!";
                    overlayDesc.innerHTML = "Ви вже використали свою знижку. Ми цінуємо вашу підтримку!";
                    overlayBadge.innerText = "ВИКОРИСТАНО";
                } else {
                    overlayTitle.innerHTML = "Продовжуй свій шлях<br>разом з Red Bull";
                    overlayDesc.innerText = "Вам нарахована знижка 10% на перше бронювання готелю!";
                    overlayBadge.innerText = "-10% АКТИВОВАНО";
                    localStorage.setItem('redbull_discount_10', 'true');
                }
            } else {
                overlayTitle.innerText = "Непоганий вибір";
                overlayDesc.innerText = "Але з Red Bull було б краще!";
                overlayBadge.style.display = "none";
            }
            overlay.classList.add("active");
            isRunning = false;
            if (videoElement.srcObject) videoElement.srcObject.getTracks().forEach(t => t.stop());
            startBtn.disabled = false; stopBtn.disabled = true;
        }

        function stop() {
            isRunning = false;
            if (videoElement.srcObject) videoElement.srcObject.getTracks().forEach(t => t.stop());
            videoElement.style.opacity = "0";
            statusText.style.display = "block";
            statusText.innerText = "Камеру вимкнено.";
            startBtn.disabled = false; stopBtn.disabled = true;
            overlay.classList.remove("active");
        }
    </script>
</body>

</html>
